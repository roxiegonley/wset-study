<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSET Level 2 — Study Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEFE2; --paper:#FBFCF5; --ink:#22271D; --ink-soft:#5A604C;
    --gold:#B68A26; --lime:#6F8E2A; --wine:#6A2E40; --line:#D6D9C4;
    --correct:#4B7A3F; --wrong:#9A3B2E;
    --shadow:0 1px 2px rgba(34,39,29,.06),0 8px 24px rgba(34,39,29,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:60px}
  .wrap{max-width:640px;margin:0 auto;padding:0 18px}
  b{font-weight:700}
  .hidden{display:none!important}

  /* HOME */
  .home-head{padding:36px 0 6px}
  .home-head .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
  .home-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(40px,11vw,60px);line-height:.95;letter-spacing:-.02em}
  .home-head p{font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);margin-top:12px;font-size:17px}
  .sec-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .ch-card{display:flex;align-items:center;gap:15px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit}
  .ch-card:hover{transform:translateY(-1px);border-color:var(--gold)}
  .ch-num{flex:0 0 46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:#fff}
  .ch-meta h2{font-family:'Fraunces',serif;font-weight:600;font-size:18px;line-height:1.15}
  .ch-meta .ess{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .arrow{margin-left:auto;color:var(--ink-soft);font-size:20px}

  /* CHAPTER HEADER */
  .topbar{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line)}
  .back{display:inline-flex;align-items:center;gap:7px;background:none;border:none;font:inherit;color:var(--ink-soft);font-weight:600;font-size:14px;padding:12px 0;cursor:pointer}
  .back:hover{color:var(--ink)}
  header.ch{padding:8px 0 16px}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:9px}
  header.ch h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(38px,11vw,62px);line-height:.92;letter-spacing:-.02em}
  header.ch .essence{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:clamp(16px,4.4vw,20px);color:var(--ink-soft);margin-top:13px;max-width:34ch}

  .facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:20px 0 4px}
  .fact{background:var(--paper);padding:12px 14px}
  .fact .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .fact .v{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-top:2px}

  nav.pills-bar{position:sticky;top:42px;z-index:25;background:var(--bg);padding:9px 0;border-bottom:1px solid var(--line);margin-bottom:4px}
  .pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 18px}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .pill:hover{border-color:var(--gold);color:var(--ink)}

  section{padding:24px 0 4px;scroll-margin-top:92px}
  .s-head{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
  .s-num{font-family:'Fraunces',serif;font-style:italic;color:var(--gold);font-size:14px;font-weight:500}
  h2.s{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.01em}
  .subhead{font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:var(--wine);margin:30px 0 4px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .subhead .s-sub{display:block;font-family:'Hanken Grotesk';font-style:normal;font-size:13px;color:var(--ink-soft);font-weight:500;margin-top:3px}
  .intro-line{font-size:13.5px;color:var(--ink-soft);margin-bottom:12px}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow)}
  .card + .card{margin-top:10px}
  ul.facts-list{list-style:none}
  ul.facts-list li{position:relative;padding:6px 0 6px 20px;border-bottom:1px solid var(--line);font-size:15px}
  ul.facts-list li:last-child{border-bottom:none}
  ul.facts-list li::before{content:"";position:absolute;left:2px;top:13px;width:7px;height:7px;border-radius:50%;background:var(--lime)}

  .gfacts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:4px}
  .gfacts .fact{padding:10px 13px}

  /* spectrum */
  .spectrum{display:flex;flex-direction:column;gap:8px}
  .stage{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper)}
  .stage-bar{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer}
  .swatch{width:15px;height:15px;border-radius:50%;flex:0 0 auto}
  .stage-bar .lbl{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .stage-bar .sub{font-size:12px;color:var(--ink-soft);margin-left:auto;text-align:right}
  .stage-body{max-height:0;overflow:hidden;transition:max-height .28s ease}
  .stage-body div{padding:0 15px 14px;font-size:14.5px;color:var(--ink-soft)}
  .stage.open .stage-body{max-height:240px}
  .chev{margin-left:8px;transition:transform .25s;color:var(--ink-soft)}
  .stage.open .chev{transform:rotate(180deg)}

  /* regions */
  .region{margin-bottom:10px}
  .region .top{display:flex;align-items:center;gap:10px;cursor:pointer}
  .flag{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--paper);background:var(--wine);padding:3px 8px;border-radius:6px;white-space:nowrap}
  .region h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600}
  .region .meta{margin-top:11px;display:none}
  .region.open .meta{display:block}
  .mrow{display:flex;gap:9px;padding:5px 0;font-size:14px;border-top:1px dashed var(--line)}
  .mrow .mk{flex:0 0 70px;color:var(--gold);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding-top:2px}

  /* flashcards */
  .grid2{display:grid;grid-template-columns:1fr;gap:10px}
  .flash{perspective:1000px;cursor:pointer;min-height:80px}
  .flash-in{position:relative;width:100%;min-height:80px;transition:transform .5s;transform-style:preserve-3d}
  .flash.flip .flash-in{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:13px;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;background:var(--paper);box-shadow:var(--shadow)}
  .flash-front .term{font-family:'Fraunces',serif;font-weight:600;font-size:17px}
  .flash-front .hint{font-size:11px;color:var(--ink-soft);margin-top:4px;letter-spacing:.04em}
  .flash-back{transform:rotateY(180deg);background:#23271D;color:#EDEFE2;border-color:#23271D}
  .flash-back .def{font-size:14px}

  /* ladder */
  .axis{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);text-align:right;margin-bottom:8px}
  .rung{border:1px solid var(--line);border-radius:12px;margin-bottom:7px;overflow:hidden;cursor:pointer;background:var(--paper)}
  .rung-bar{display:flex;align-items:center;gap:12px;padding:12px 15px}
  .level{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:#fff}
  .rung .name{font-family:'Fraunces',serif;font-weight:600;font-size:15px}
  .rung .gloss{font-size:12px;color:var(--ink-soft);margin-left:auto;text-align:right;max-width:42%}
  .rung-body{max-height:0;overflow:hidden;transition:max-height .28s}
  .rung-body div{padding:0 15px 13px 53px;font-size:14px;color:var(--ink-soft)}
  .rung.open .rung-body{max-height:200px}
  .ladder-note{font-size:13px;color:var(--wine);margin-top:10px;font-weight:600}

  /* hooks */
  .hook{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:13px 15px;margin-bottom:9px}
  .hook .h{font-family:'Fraunces',serif;font-weight:600;font-size:15.5px}
  .hook .h em{color:var(--wine);font-style:italic}
  .hook .b{font-size:13.5px;color:var(--ink-soft);margin-top:4px}

  /* traps */
  .trap{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px}
  .trap:last-child{border-bottom:none}
  .trap .x{flex:0 0 auto;color:var(--wrong);font-weight:700;font-family:'Fraunces',serif}

  /* quiz */
  .q{margin-bottom:14px}
  .q .stem{font-weight:600;font-size:15.5px;margin-bottom:9px}
  .q .stem span{color:var(--gold);font-family:'Fraunces',serif;font-style:italic;margin-right:6px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:11px 13px;margin-bottom:7px;font:inherit;font-size:14.5px;cursor:pointer;transition:all .12s}
  .opt:hover{border-color:var(--gold)}
  .opt.correct{border-color:var(--correct);background:#EAF1E5;color:var(--correct);font-weight:600}
  .opt.wrong{border-color:var(--wrong);background:#F4E7E4;color:var(--wrong)}
  .opt:disabled{cursor:default}
  .why{font-size:13.5px;color:var(--ink-soft);padding:9px 13px;background:#EFF1E6;border-radius:10px;margin-top:2px;display:none}
  .why.show{display:block}
  .score{font-family:'Fraunces',serif;font-size:17px;text-align:center;padding:14px;color:var(--ink-soft)}
  footer{text-align:center;padding:28px 0 4px;color:var(--ink-soft);font-size:12px}
  footer span{color:var(--gold)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="wrap">
  <div class="home-head">
    <div class="eyebrow">WSET Level 2 Award in Wines</div>
    <h1>Study Cards</h1>
    <p>Tap a chapter. Built from your own study pack.</p>
  </div>
  <div id="chapterGrid"></div>
  <footer>Pass mark 55% · 50 questions · 1 hour</footer>
</div>

<!-- CHAPTER VIEW -->
<div id="chapterView" class="hidden">
  <div class="topbar"><div class="wrap"><button class="back" onclick="goHome()">&larr; All chapters</button></div></div>
  <nav class="pills-bar"><div class="pills" id="pills"></div></nav>
  <div class="wrap" id="chapterBody"></div>
</div>

      "Viognier is aromatic but, unusually, can be oak-aged (e.g. Condrieu).",
      "Albariño's home is Rías Baixas (Spain), Atlantic-cooled, high acidity.",
      "Gewurztraminer, Riesling and Pinot Gris are the Alsace grand cru trio."]},
    {type:"quiz", nav:"Test", title:"Self-test", items:[
      {q:"Which aroma is the classic giveaway for Gewurztraminer?", opts:["Lychee","Petrol","Asparagus","Wet stones"], a:0, why:"Lychee (with rose) is the hallmark Gewurztraminer aroma."},
      {q:"A typical Gewurztraminer is…", opts:["Light, high acid, low alcohol","Full-bodied, high alcohol, low–medium acidity","Sweet and sparkling","Tannic and red"], a:1, why:"High sugar at harvest gives a full-bodied, high-alcohol, low–medium-acid wine."},
      {q:"Condrieu AOC, in the Northern Rhône, is dedicated to which grape?", opts:["Gewurztraminer","Viognier","Albariño","Chardonnay"], a:1, why:"Condrieu is dedicated to single-varietal Viognier."},
      {q:"Albariño's home region is…", opts:["Alsace","Condrieu","Rías Baixas","Marlborough"], a:2, why:"Rías Baixas in NW Spain, cooled by the Atlantic."},
      {q:"Which trio are the typical Alsace grand cru white grapes?", opts:["Gewurztraminer, Riesling, Pinot Gris","Sauvignon, Sémillon, Muscadet","Chardonnay, Viognier, Albariño","Chenin, Furmint, Viognier"], a:0, why:"Gewurztraminer, Riesling and Pinot Gris are the classic Alsace grand cru grapes."}]}
  ]
}
];

/* ============ RENDER HELPERS ============ */
const el=(html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;};
const ROMAN=["i","ii","iii","iv","v","vi","vii","viii","ix","x"];

function renderHome(){
  const grid=document.getElementById('chapterGrid');
  let html='<div class="sec-label">Section 3 · Grape Varieties & Still Wines</div>';
  CHAPTERS.forEach(ch=>{
    html+=`<button class="ch-card" onclick="openChapter('${ch.id}')">
      <span class="ch-num" style="background:${ch.swatch};color:#3a2e10">${ch.num}</span>
      <span class="ch-meta"><h2>${ch.title}</h2><span class="ess">${ch.essence}</span></span>
      <span class="arrow">&rarr;</span></button>`;
  });
  grid.innerHTML=html;
}

function buildSection(sec, idx){
  const id="sec-"+idx;
  let inner="";
  const head=(n,t)=>`<div class="s-head"><span class="s-num">${ROMAN[n]||""}</span><h2 class="s">${t}</h2></div>`;
  const intro=sec.intro?`<p class="intro-line">${sec.intro}</p>`:"";
  switch(sec.type){
    case "subhead":
      return el(`<section id="${id}"><div class="subhead">${sec.title}<span class="s-sub">${sec.sub||""}</span></div></section>`);
    case "gfacts":{
      let f=sec.facts.map(([k,v])=>`<div class="fact"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
      return el(`<section id="${id}"><div class="gfacts">${f}</div></section>`);
    }
    case "bullets":{
      const t=sec.title?head(sec._n,sec.title):"";
      const lis=sec.items.map(i=>`<li>${i}</li>`).join("");
      return el(`<section id="${id}">${t}<div class="card"><ul class="facts-list">${lis}</ul></div></section>`);
    }
    case "spectrum":{
      const stages=sec.stages.map(s=>`<div class="stage"><div class="stage-bar"><span class="swatch" style="background:${s.c}"></span><span class="lbl">${s.lbl}</span><span class="sub">${s.sub}</span><span class="chev">&#9662;</span></div><div class="stage-body"><div>${s.body}</div></div></div>`).join("");
      return el(`<section id="${id}">${head(sec._n,sec.title)}${intro}<div class="spectrum">${stages}</div></section>`);
    }
    case "regions":{
      const cards=sec.items.map(r=>`<div class="card region"><div class="top"><span class="flag">${r.flag}</span><h3>${r.name}</h3></div><div class="meta"><div class="mrow"><div class="mk">Climate</div><div>${r.climate}</div></div><div class="mrow"><div class="mk">Place</div><div>${r.place}</div></div><div class="mrow"><div class="mk">Style</div><div>${r.style}</div></div></div></div>`).join("");
      return el(`<section id="${id}">${sec.title?head(sec._n,sec.title):""}${intro}${cards}</section>`);
    }
    case "flash":{
      const cards=sec.cards.map(c=>`<div class="flash"><div class="flash-in"><div class="flash-face flash-front"><div class="term">${c.t}</div><div class="hint">${c.h} · tap to reveal</div></div><div class="flash-face flash-back"><div class="def">${c.d}</div></div></div></div>`).join("");
      return el(`<section id="${id}">${head(sec._n,sec.title)}${intro}<div class="grid2">${cards}</div></section>`);
    }
    case "ladder":{
      const rungs=sec.rungs.map(p=>`<div class="rung"><div class="rung-bar"><span class="level" style="background:${p.col}">${p.ab}</span><span class="name">${p.name}</span><span class="gloss">${p.gloss}</span></div><div class="rung-body"><div>${p.body}</div></div></div>`).join("");
      return el(`<section id="${id}">${head(sec._n,sec.title)}${intro}<div class="axis">&uarr; more grape sugar at harvest</div>${rungs}<div class="ladder-note">${sec.note}</div></section>`);
    }
    case "hooks":{
      const hk=sec.items.map(h=>`<div class="hook"><div class="h">${h.h}</div><div class="b">${h.b}</div></div>`).join("");
      return el(`<section id="${id}">${head(sec._n,sec.title)}${hk}</section>`);
    }
    case "traps":{
      const tr=sec.items.map(t=>`<div class="trap"><span class="x">!</span><span>${t}</span></div>`).join("");
      return el(`<section id="${id}">${head(sec._n,sec.title)}<div class="card">${tr}</div></section>`);
    }
    case "quiz":{
      const sec_el=el(`<section id="${id}">${head(sec._n,sec.title)}<div class="quizwrap"></div><div class="score"></div></section>`);
      const qw=sec_el.querySelector('.quizwrap');
      let answered=0,correct=0;const total=sec.items.length;
      sec.items.forEach((item,qi)=>{
        const card=el(`<div class="q card"><div class="stem"><span>${qi+1}.</span>${item.q}</div></div>`);
        item.opts.forEach((o,oi)=>{
          const b=el(`<button class="opt">${o}</button>`);
          b.addEventListener('click',()=>{
            const group=[...card.querySelectorAll('.opt')];
            if(group.some(x=>x.disabled))return;
            group.forEach(x=>x.disabled=true);
            if(oi===item.a){b.classList.add('correct');correct++;}
            else{b.classList.add('wrong');group[item.a].classList.add('correct');}
            card.querySelector('.why').classList.add('show');
            answered++;
            if(answered===total){sec_el.querySelector('.score').textContent=`You scored ${correct} / ${total}.`;}
          });
          card.appendChild(b);
        });
        card.appendChild(el(`<div class="why">${item.why}</div>`));
        qw.appendChild(card);
      });
      return sec_el;
    }
  }
  return el(`<section id="${id}"></section>`);
}

function openChapter(cid){
  const ch=CHAPTERS.find(c=>c.id===cid);
  document.getElementById('home').classList.add('hidden');
  const view=document.getElementById('chapterView');
  view.classList.remove('hidden');
  const body=document.getElementById('chapterBody');
  body.innerHTML="";

  // header
  let factsHtml="";
  if(ch.facts){factsHtml=`<div class="facts">${ch.facts.map(([k,v])=>`<div class="fact"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("")}</div>`;}
  body.appendChild(el(`<header class="ch"><div class="eyebrow">${ch.section} · Ch. ${ch.num}</div><h1>${ch.title}</h1><p class="essence">${ch.essence}</p>${factsHtml}</header>`));

  // number the numbered sections
  let n=0;
  ch.sections.forEach(s=>{ if(["bullets","spectrum","flash","ladder","hooks","traps","quiz","regions"].includes(s.type) && (s.title)) {s._n=n;n++;} });

  // build sections + pills
  const pills=document.getElementById('pills');pills.innerHTML="";
  ch.sections.forEach((s,i)=>{
    const node=buildSection(s,i);
    body.appendChild(node);
    if(s.nav){
      const p=el(`<button class="pill">${s.nav}</button>`);
      p.addEventListener('click',()=>document.getElementById("sec-"+i).scrollIntoView({behavior:'smooth',block:'start'}));
      pills.appendChild(p);
    }
  });
  body.appendChild(el(`<footer>Built from your WSET L2 pack · <span>${ch.title}</span></footer>`));

  // wire spectrum + region toggles + flips
  body.querySelectorAll('.stage-bar').forEach(b=>b.addEventListener('click',()=>b.parentElement.classList.toggle('open')));
  body.querySelectorAll('.region .top').forEach(t=>t.addEventListener('click',()=>t.closest('.region').classList.toggle('open')));
  body.querySelectorAll('.rung').forEach(r=>r.addEventListener('click',()=>r.classList.toggle('open')));
  body.querySelectorAll('.flash').forEach(f=>f.addEventListener('click',()=>f.classList.toggle('flip')));

  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('chapterView').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  window.scrollTo(0,0);
}

renderHome();
</script>
</body>
</html>
